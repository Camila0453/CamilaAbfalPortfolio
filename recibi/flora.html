<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuerdos</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      font-family:'Poppins', sans-serif;
      margin:0;
      padding:40px 20px;
      background: linear-gradient(#ECE7D1, #DBCEA5, #ffe3f1);
      color:#8A7650;
      text-align:center;
      min-height:100vh;
    }
.canva-container{
  max-width:700px;
  margin:40px auto;
  text-align:center;
}

.canva-frame{
  position:relative;
  width:100%;
  padding-top:56.25%;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.canva-frame iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
}
    h1{
      margin-bottom:30px;
      font-weight:600;
    }

    .carousel-contenedor{
      max-width:800px;
      margin:0 auto;
    }

    .carousel{
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.4);
    }

    .carousel-item img{
      height:500px;
      object-fit:cover;
    }

    .carousel-caption{
      background: rgba(0,0,0,0.45);
      border-radius:15px;
      padding:12px;
    }

    .carousel-caption h5,
    .carousel-caption p{
      color:white;
      margin:0;
    }

    .carousel-caption p{
      margin-top:6px;
      font-size:0.95rem;
    }

    .boton-volver{
      display:inline-block;
      margin-top:30px;
      text-decoration:none;
      background:#b88a44;
      color:white;
      padding:12px 22px;
      border-radius:14px;
      transition:0.3s;
      font-weight:500;
    }

    .boton-volver:hover{
      background:#9f7435;
      transform:scale(1.05);
    }

    @media (max-width: 768px){
      .carousel-item img{
        height:300px;
      }

      h1{
        font-size:1.5rem;
      }

      .carousel-caption h5{
        font-size:1rem;
      }

      .carousel-caption p{
        font-size:0.8rem;
      }
    }
  </style>
</head>
<body>

  <h1> Conocé mi trabajo final :) </h1>
  <p> App de identificación de plantas patágonicas con IA</p>
<div class="canva-container">

  <div class="canva-frame">
    <iframe loading="lazy"
      src="https://www.canva.com/design/DAG6jt0xz0Y/TKwwRATj5c86hnQZBWEHdw/view?embed"
      allowfullscreen>
    </iframe>
  </div>

  <p>

      Laboratorio de desarrollo de software

  </p>

</div>
